# Default CNI is disabled; Calico is installed by scripts/bootstrap-local.sh
# before anything else so NetworkPolicy is actually enforced (kindnet does
# not enforce NetworkPolicy).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: node-api-demo
networking:
  disableDefaultCNI: true
  podSubnet: 192.168.0.0/16
nodes:
  - role: control-plane
    labels:
      ingress-ready: "true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
