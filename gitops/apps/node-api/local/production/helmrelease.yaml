# Local simulation of the production profile (PDB, HPA floor, topology
# spread, ServiceMonitor) inside the kind cluster's node-api-production
# namespace. Real production is a separate EKS cluster/AWS account — see
# gitops/apps/node-api/production/, which this local variant mirrors minus
# AWS-specific pieces (ALB/ECR/IRSA replaced with nginx/GHCR/local ESO).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-api
  namespace: node-api-production
spec:
  interval: 1m
  chart:
    spec:
      chart: ./helm/node-api
      sourceRef:
        kind: GitRepository
        name: node-api-platform
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/REPLACE_WITH_OWNER/node-api
      tag: local
      pullPolicy: IfNotPresent
    config:
      appEnv: production
      logLevel: INFO
      nodesCacheTtlSeconds: 30
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
      stabilizationWindowSeconds: 300
    pdb:
      enabled: true
      minAvailable: 2
    topologySpread:
      enabled: true
    serviceMonitor:
      enabled: false
    reloader:
      enabled: true
    ingress:
      enabled: true
      className: nginx
      host: prod.node-api.local
    secret:
      name: node-api-secret
      apiTokenKey: API_TOKEN
