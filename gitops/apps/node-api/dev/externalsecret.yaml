apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: node-api-secret
  namespace: node-api-dev
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: node-api-local
    kind: SecretStore
  target:
    name: node-api-secret
    creationPolicy: Owner
  data:
    - secretKey: API_TOKEN
      remoteRef:
        key: node-api-bootstrap-token
        property: API_TOKEN
