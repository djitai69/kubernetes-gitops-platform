# Image repository substituted at apply-time — see ../dev/helmrelease.yaml.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-api
  namespace: node-api-staging
spec:
  interval: 1m
  timeout: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  rollback:
    timeout: 3m
    cleanupOnFail: true
  chart:
    spec:
      chart: ./helm/node-api
      sourceRef:
        kind: GitRepository
        name: node-api-platform
        namespace: flux-system
  values:
    image:
      repository: ${ECR_REPOSITORY_URL}
      tag: aws-demo
      pullPolicy: IfNotPresent
    config:
      appEnv: staging
      logLevel: INFO
      nodesCacheTtlSeconds: 15
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
    pdb:
      enabled: true
      maxUnavailable: 1
    topologySpread:
      enabled: true
    serviceMonitor:
      enabled: false
    reloader:
      enabled: true
    ingress:
      enabled: true
      className: alb
      host: ""
      annotations:
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/target-type: ip
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    networkPolicy:
      kubernetesApi:
        ports: [443]
        cidr: "10.40.0.0/16"
    secret:
      name: node-api-secret
      apiTokenKey: API_TOKEN
