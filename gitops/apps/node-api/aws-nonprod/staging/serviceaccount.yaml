# IRSA ServiceAccount used only by ESO's SecretStore to reach AWS Secrets
# Manager — the application's own ServiceAccount (created by the Helm
# chart) never receives AWS IAM permissions. Role ARN substituted at
# apply-time (see gitops/clusters/aws-nonprod/flux-system/kustomization-apps.yaml).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-api-secrets-reader
  namespace: node-api-staging
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::${AWS_ACCOUNT_ID}:role/node-api-nonprod-eso-node-api-staging"
