apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: node-api-secret
  namespace: node-api-dev
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: node-api-aws
    kind: SecretStore
  target:
    name: node-api-secret
    creationPolicy: Owner
  data:
    - secretKey: API_TOKEN
      remoteRef:
        key: node-api/dev/api-token
