# IRSA ServiceAccount used only by ESO's SecretStore to reach AWS Secrets
# Manager. The application's own ServiceAccount (created by the Helm chart)
# never receives AWS IAM permissions.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-api-secrets-reader
  namespace: node-api-production
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::<production-account>:role/node-api-production-secrets-reader"
