# AWS production target. Not reconciled by the local kind cluster — this
# HelmRelease is applied by the production EKS cluster's own Flux
# installation, watching only this path (see decisions doc section 18).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-api
  namespace: node-api-production
spec:
  interval: 1m
  timeout: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  rollback:
    timeout: 3m
    cleanupOnFail: true
  chart:
    spec:
      chart: ./helm/node-api
      sourceRef:
        kind: GitRepository
        name: node-api-platform
        namespace: flux-system
  values:
    image:
      repository: <production-account>.dkr.ecr.<region>.amazonaws.com/node-api
      # Set by the protected production promotion PR; digest copied from
      # the tested non-production image, never rebuilt.
      tag: v1.4.0
      digest: "sha256:REPLACE_WITH_PROMOTED_DIGEST"
    config:
      appEnv: production
      logLevel: INFO
      nodesCacheTtlSeconds: 30
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
      stabilizationWindowSeconds: 300
    pdb:
      enabled: true
      minAvailable: 2
    topologySpread:
      enabled: true
    serviceMonitor:
      enabled: true
    reloader:
      enabled: true
    ingress:
      enabled: true
      className: alb
      host: api.example.com
      annotations:
        alb.ingress.kubernetes.io/target-type: ip
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
        alb.ingress.kubernetes.io/scheme: internet-facing
    networkPolicy:
      kubernetesApi:
        ports: [443]
        cidr: "REPLACE_WITH_VPC_CONTROL_PLANE_CIDR"
    secret:
      name: node-api-secret
      apiTokenKey: API_TOKEN
