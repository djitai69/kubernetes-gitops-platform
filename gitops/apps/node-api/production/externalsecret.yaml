apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: node-api-secret
  namespace: node-api-production
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: node-api-aws
    kind: SecretStore
  target:
    name: node-api-secret
    creationPolicy: Owner
  data:
    - secretKey: API_TOKEN
      remoteRef:
        key: node-api/production/api-token
