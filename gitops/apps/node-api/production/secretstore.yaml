# AWS production SecretStore: ESO reads from AWS Secrets Manager via a
# namespace-scoped IAM role (IRSA), never via application-held AWS
# credentials. See docs/secrets.md.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: node-api-aws
  namespace: node-api-production
spec:
  provider:
    aws:
      service: SecretsManager
      region: <region>
      auth:
        jwt:
          serviceAccountRef:
            name: node-api-secrets-reader
