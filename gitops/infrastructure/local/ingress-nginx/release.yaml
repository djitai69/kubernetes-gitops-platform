apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: ingress-nginx
  install:
    createNamespace: true
  chart:
    spec:
      chart: ingress-nginx
      version: "4.11.x"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
  values:
    controller:
      hostPort:
        enabled: true
      service:
        type: NodePort
      # kind maps host ports 80/443 to the control-plane node via
      # extraPortMappings; the controller runs with hostPort instead of a
      # cloud LoadBalancer.
      nodeSelector:
        ingress-ready: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Equal
          effect: NoSchedule
      admissionWebhooks:
        enabled: true
      metrics:
        enabled: false
