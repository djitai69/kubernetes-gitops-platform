apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: kube-system
  chart:
    spec:
      chart: metrics-server
      version: "3.12.x"
      sourceRef:
        kind: HelmRepository
        name: metrics-server
  values:
    # kind's kubelet serving certs are not signed for a real CA chain;
    # this is a documented local-only relaxation. AWS EKS uses the default
    # secure configuration.
    args:
      - --kubelet-insecure-tls
