apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: reloader
  install:
    createNamespace: true
  chart:
    spec:
      chart: reloader
      version: "1.x"
      sourceRef:
        kind: HelmRepository
        name: stakater
  values:
    reloader:
      watchGlobally: true
      # Explicit resource annotations are preferred over watching every
      # Secret/ConfigMap; the app's Deployment carries
      # reloader.stakater.com/auto: "true" instead of relying on a
      # cluster-wide implicit watch policy.
      reloadOnCreate: false
      deployment:
        # See ../kyverno/release.yaml for why this is needed.
        tolerations:
          - key: node-role
            operator: Equal
            value: platform
            effect: NoSchedule
