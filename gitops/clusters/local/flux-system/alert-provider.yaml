# Slack credential is stored in a Secret, never in Git. Create it with:
#   kubectl -n flux-system create secret generic slack-webhook \
#     --from-literal=address=https://hooks.slack.com/services/REPLACE
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: slack
  namespace: flux-system
spec:
  type: slack
  secretRef:
    name: slack-webhook
