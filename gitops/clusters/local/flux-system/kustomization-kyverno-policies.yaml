# Kyverno ClusterPolicies from policies/kyverno/{enforce,audit}. A sibling
# of "infrastructure" (not one of its managed resources) — infrastructure
# has wait:true and health-checks everything it applies, so nesting a
# Kustomization here that dependsOn infrastructure would deadlock: neither
# could become Ready while waiting on the other.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kyverno-policies
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: node-api-platform
  path: ./policies/kyverno
  prune: true
  dependsOn:
    - name: infrastructure
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: kyverno-admission-controller
      namespace: kyverno
  timeout: 5m
