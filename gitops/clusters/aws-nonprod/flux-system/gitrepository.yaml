# Points at the real, published, public GitHub repository — no local git
# substitute here (unlike the kind demo; see docs/gitops.md), since real
# EKS nodes have no network path to a container on a developer's laptop.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: node-api-platform
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/djitai69/kubernetes-gitops-platform.git
  ref:
    branch: main
