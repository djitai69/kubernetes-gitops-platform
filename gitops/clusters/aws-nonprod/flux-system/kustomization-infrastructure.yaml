# postBuild.substituteFrom resolves ${AWS_ACCOUNT_ID} / ${AWS_REGION}
# placeholders in gitops/infrastructure/aws-nonprod/ from a Secret that
# cloud-up.sh creates directly on the cluster (kubectl, using real
# Terraform outputs) — never committed to Git. See docs/gitops.md.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: node-api-platform
  path: ./gitops/infrastructure/aws-nonprod
  prune: true
  wait: true
  timeout: 10m
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
