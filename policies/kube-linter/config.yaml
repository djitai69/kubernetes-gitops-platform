# kube-linter runs against rendered/raw manifests as a second, independent
# check alongside Kyverno — catches structural issues Kyverno's admission
# rules don't (e.g. mismatched selectors, missing PDB for HPA-scaled
# workloads) using a different rule engine.
checks:
  addAllBuiltIn: false
  include:
    - "no-read-only-root-fs"
    - "run-as-non-root"
    - "unset-cpu-requirements"
    - "unset-memory-requirements"
    - "privileged-container"
    - "host-network"
    - "host-pid"
    - "host-ipc"
    - "docker-sock"
    - "privilege-escalation-container"
    - "latest-tag"
    - "no-liveness-probe"
    - "no-readiness-probe"
    - "drop-net-raw-capability"
    - "non-existent-service-account"
    - "ssh-port"
