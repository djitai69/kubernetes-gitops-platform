apiVersion: v1
kind: Pod
metadata:
  name: good-pod
  namespace: node-api-production
  labels:
    app.kubernetes.io/name: node-api
    app.kubernetes.io/instance: node-api
spec:
  serviceAccountName: node-api
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: node-api
      image: ghcr.io/example/node-api:a8f2c91
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        capabilities:
          drop: ["ALL"]
      livenessProbe:
        httpGet:
          path: /health/live
          port: 8000
      readinessProbe:
        httpGet:
          path: /health/ready
          port: 8000
