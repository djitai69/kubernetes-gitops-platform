apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: pod-security-baseline-test
policies:
  - ../../enforce/pod-security-baseline.yaml
  - ../../enforce/resource-requirements.yaml
  - ../../enforce/probes.yaml
resources:
  - good-pod.yaml
  - bad-pod-privileged.yaml
  - bad-pod-no-resources.yaml
results:
  - policy: pod-security-baseline
    rule: disallow-privileged-containers
    resources:
      - good-pod
    kind: Pod
    result: pass
  - policy: pod-security-baseline
    rule: disallow-privileged-containers
    resources:
      - bad-pod-privileged
    kind: Pod
    result: fail
  - policy: pod-security-baseline
    rule: disallow-host-namespaces
    resources:
      - bad-pod-privileged
    kind: Pod
    result: fail
  - policy: pod-security-baseline
    rule: disallow-privilege-escalation
    resources:
      - bad-pod-privileged
    kind: Pod
    result: fail
  - policy: pod-security-baseline
    rule: require-readonly-root-filesystem
    resources:
      - bad-pod-privileged
    kind: Pod
    result: fail
  - policy: require-resource-requirements
    rule: require-requests-and-limits
    resources:
      - good-pod
    kind: Pod
    result: pass
  - policy: require-resource-requirements
    rule: require-requests-and-limits
    resources:
      - bad-pod-no-resources
    kind: Pod
    result: fail
  - policy: require-probes
    rule: require-liveness-and-readiness-probes
    resources:
      - good-pod
    kind: Pod
    result: pass
  - policy: require-probes
    rule: require-liveness-and-readiness-probes
    resources:
      - bad-pod-no-resources
    kind: Pod
    result: fail
