# Reference dev overlay. The GitOps repository's copy under
# gitops/apps/node-api/dev/values.yaml is the one Flux actually applies;
# this file exists so the chart is independently testable with `helm template`.
config:
  appEnv: dev
  logLevel: DEBUG
  nodesCacheTtlSeconds: 5

replicaCount: 1

autoscaling:
  enabled: false

pdb:
  enabled: false

topologySpread:
  enabled: false
