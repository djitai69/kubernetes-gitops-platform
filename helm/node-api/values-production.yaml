image:
  repository: <production-account>.dkr.ecr.<region>.amazonaws.com/node-api
  tag: v1.4.0
  digest: ""

config:
  appEnv: production
  logLevel: INFO
  nodesCacheTtlSeconds: 30

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  stabilizationWindowSeconds: 300

pdb:
  enabled: true
  minAvailable: 2

topologySpread:
  enabled: true

serviceMonitor:
  enabled: true

reloader:
  enabled: true

ingress:
  enabled: true
  className: alb
  host: api.example.com
  annotations:
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/scheme: internet-facing
