{{/*
Local-only Secret fallback. Disabled by default. The production path is
always External Secrets Operator materializing this same Secret name/key
from AWS Secrets Manager (see docs/secrets.md). Enable only for kind demos
without ESO installed.
*/}}
{{- if .Values.localSecretFallback.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "node-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secret.apiTokenKey }}: {{ .Values.localSecretFallback.apiToken | quote }}
{{- end }}
