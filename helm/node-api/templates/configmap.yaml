apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "node-api.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "node-api.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.config.appEnv | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  KUBERNETES_REQUEST_TIMEOUT_SECONDS: {{ .Values.config.kubernetesRequestTimeoutSeconds | quote }}
  NODES_CACHE_TTL_SECONDS: {{ .Values.config.nodesCacheTtlSeconds | quote }}
  METRICS_PORT: {{ .Values.ports.metrics | quote }}
