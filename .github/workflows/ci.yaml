name: CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "helm/**"
      - "policies/**"
      - ".github/workflows/ci.yaml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "helm/**"
      - "policies/**"
      - ".github/workflows/ci.yaml"

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/node-api

jobs:
  lint-and-test:
    name: Lint, unit test, dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt

      - name: Install dependencies
        working-directory: app
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: app
        run: ruff check node_api tests

      - name: Unit tests
        working-directory: app
        run: PYTHONPATH=. pytest tests/ -v

      - name: Dependency vulnerability scan
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: app/requirements.txt

  policy-checks:
    name: Helm lint, kube-linter, Kyverno CLI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "v3.16.3"

      - name: Helm lint (all environments)
        run: |
          for env in dev staging production local; do
            helm lint helm/node-api -f helm/node-api/values-$env.yaml
          done

      - name: Helm template (sanity render)
        run: helm template node-api helm/node-api -f helm/node-api/values-production.yaml

      - name: kube-linter
        uses: stackrox/kube-linter-action@v1
        with:
          directory: helm/node-api
          config: policies/kube-linter/config.yaml

      - name: Install Kyverno CLI
        run: |
          curl -sL -o kyverno-cli.tar.gz \
            https://github.com/kyverno/kyverno/releases/download/v1.18.2/kyverno-cli_v1.18.2_linux_x86_64.tar.gz
          tar xzf kyverno-cli.tar.gz kyverno
          chmod +x kyverno
          sudo mv kyverno /usr/local/bin/kyverno

      - name: Kyverno policy tests
        run: kyverno test policies/kyverno/tests/pod-security/

  build-scan-push:
    name: Build, scan, and push image
    needs: [lint-and-test, policy-checks]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: app
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}
          provenance: false

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}"
          format: table
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

  update-dev-gitops:
    name: Update dev image reference in GitOps repo
    needs: build-scan-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # A GitHub App token is used instead of a PAT so commits are
          # attributed to a scoped bot identity, not a personal account,
          # and access can be revoked/rotated independently of any user.
          # See docs/gitops.md for the exact App permission set.
          token: ${{ secrets.GITOPS_BOT_TOKEN }}

      - name: Bump dev image tag
        run: |
          sed -i "s/tag: .*/tag: ${{ needs.build-scan-push.outputs.short_sha }}/" \
            gitops/apps/node-api/dev/helmrelease.yaml

      - name: Commit and push
        run: |
          git config user.name "node-api-gitops-bot"
          git config user.email "gitops-bot@users.noreply.github.com"
          git add gitops/apps/node-api/dev/helmrelease.yaml
          git diff --cached --quiet || git commit -m "ci: deploy ${{ needs.build-scan-push.outputs.short_sha }} to dev [skip ci]"
          git push
